<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- iPhone Safari用 (Webクリップアイコン) -->
    <link rel="apple-touch-icon" href="apple-touch-icon.png" sizes="180x180">
    <!-- Android Chrome用 (ホーム画面ショートカット/PWAアイコン) -->
    <link rel="icon" href="android-chrome-192.png" sizes="192x192" type="image/png">
    <!-- 共通ファビコン -->
    <link rel="icon" href="favicon.png" sizes="any">
    <title>角ダクト振れ管シミュレーター</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap');
        body { 
            font-family: 'Noto Sans JP', sans-serif; 
            background-color: #f8fafc;
        }
        canvas { 
            background-color: #ffffff; 
            border: 1px solid #e2e8f0; 
            border-radius: 4px; 
            width: 100%; 
            height: 100%;
        }
        input[type="number"] { 
            border: 1px solid #cbd5e1; 
            border-radius: 4px; 
            padding: 4px 8px; 
            width: 100%; 
            font-size: 14px; 
            font-weight: bold; 
        }
        .tab-btn { 
            padding: 4px 2px; 
            font-size: 12px; 
            font-weight: bold; 
            cursor: pointer; 
            border: 1px solid #cbd5e1; 
            background: white; 
        }
        .tab-btn.active { background: #1e293b; color: white; border-color: #1e293b; }
        .tab-group { display: flex; border-radius: 4px; overflow: hidden; margin-bottom: 2px; }
        
        #previewModal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            z-index: 100;
            padding: 20px;
            overflow-y: auto;
        }
        #previewModal.active { display: flex; flex-direction: column; align-items: center; }
    </style>
</head>
<body class="text-slate-800 text-sm">

<div class="max-w-7xl mx-auto flex flex-col lg:flex-row min-h-screen">
    <!-- 設定パネル -->
    <div class="lg:w-72 w-full bg-white border-b lg:border-r border-slate-200 p-4 shadow-sm overflow-y-auto">
        <h2 class="text-base font-black mb-4 border-l-4 border-slate-800 pl-2">設定入力</h2>
        
        <div class="space-y-4">
            <section class="grid grid-cols-2 gap-2">
                <div><label class="text-[10px] font-bold text-slate-500">A面 幅(W)</label><input type="number" id="w1" value="500"></div>
                <div><label class="text-[10px] font-bold text-slate-500">A面 高(H)</label><input type="number" id="h1" value="500"></div>
            </section>

            <section class="grid grid-cols-2 gap-2">
                <div><label class="text-[10px] font-bold text-slate-500">B面 幅(W)</label><input type="number" id="w2" value="800"></div>
                <div><label class="text-[10px] font-bold text-slate-500">B面 高(H)</label><input type="number" id="h2" value="300"></div>
            </section>

            <section>
                <label class="text-[10px] font-bold text-slate-500">全長 (L)</label>
                <input type="number" id="L" value="600">
            </section>

            <hr>

            <section>
                <h3 class="text-[11px] font-bold text-blue-600 mb-1">横振れ (X方向)</h3>
                <div class="tab-group" id="baseX">
                    <button class="tab-btn flex-1 active" onclick="setParam('baseX','left')">左基準</button>
                    <button class="tab-btn flex-1" onclick="setParam('baseX','center')">芯基準</button>
                    <button class="tab-btn flex-1" onclick="setParam('baseX','right')">右基準</button>
                </div>
                <input type="number" id="offX" value="300" class="mb-1">
                <div class="tab-group" id="dirX">
                    <button class="tab-btn flex-1" onclick="setParam('dirX','left')">左へ</button>
                    <button class="tab-btn flex-1 active" onclick="setParam('dirX','right')">右へ</button>
                </div>
            </section>

            <section>
                <h3 class="text-[11px] font-bold text-orange-600 mb-1">縦振れ (Y方向)</h3>
                <div class="tab-group" id="baseY">
                    <button class="tab-btn flex-1" onclick="setParam('baseY','top')">天基準</button>
                    <button class="tab-btn flex-1 active" onclick="setParam('baseY','center')">芯基準</button>
                    <button class="tab-btn flex-1" onclick="setParam('baseY','bottom')">底基準</button>
                </div>
                <input type="number" id="offY" value="200" class="mb-1">
                <div class="tab-group" id="dirY">
                    <button class="tab-btn flex-1 active" onclick="setParam('dirY','down')">下げ</button>
                    <button class="tab-btn flex-1" onclick="setParam('dirY','up')">上げ</button>
                </div>
            </section>

            <button onclick="exportOrderImage()" class="w-full bg-slate-800 hover:bg-slate-900 text-white font-bold py-3 rounded shadow mt-4">
                製作仕様書を作成
            </button>
        </div>
    </div>

    <!-- プレビューエリア -->
    <div class="flex-1 p-4 lg:p-6 space-y-4">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
                <span class="text-[10px] font-bold text-slate-400 block mb-1">平面図 (Top View)</span>
                <div class="aspect-square"><canvas id="topView"></canvas></div>
            </div>
            <div>
                <span class="text-[10px] font-bold text-slate-400 block mb-1">正面図 (Front View)</span>
                <div class="aspect-square"><canvas id="frontView"></canvas></div>
            </div>
        </div>
        <div>
            <span class="text-[10px] font-bold text-slate-400 block mb-1">側面図 (Side View)</span>
            <div class="h-80"><canvas id="sideView"></canvas></div>
        </div>
    </div>
</div>

<div id="previewModal">
    <div class="bg-white p-2 rounded-sm shadow-2xl max-w-full">
        <img id="previewImage" class="max-w-full">
        <div class="flex gap-2 p-4">
            <button onclick="closeModal()" class="flex-1 bg-slate-200 py-3 rounded font-bold">戻る</button>
            <button onclick="window.print()" class="flex-1 bg-slate-800 text-white py-3 rounded font-bold">印刷</button>
        </div>
    </div>
</div>

<canvas id="exportCanvas" style="display:none;"></canvas>

<script>
    let state = { baseX: 'left', baseY: 'center', dirX: 'right', dirY: 'down' };

    function getParams() {
        return {
            w1: parseFloat(document.getElementById('w1').value) || 0,
            h1: parseFloat(document.getElementById('h1').value) || 0,
            w2: parseFloat(document.getElementById('w2').value) || 0,
            h2: parseFloat(document.getElementById('h2').value) || 0,
            L: parseFloat(document.getElementById('L').value) || 0,
            offX: parseFloat(document.getElementById('offX').value) || 0,
            offY: parseFloat(document.getElementById('offY').value) || 0
        };
    }

    function calculateOffsets(p) {
        let cox = 0; 
        if (state.baseX === 'left') cox = (state.dirX === 'right' ? p.offX : -p.offX) - (p.w1 - p.w2) / 2;
        else if (state.baseX === 'right') cox = (state.dirX === 'right' ? p.offX : -p.offX) + (p.w1 - p.w2) / 2;
        else cox = (state.dirX === 'right' ? p.offX : -p.offX);

        let coy = 0; 
        if (state.baseY === 'top') coy = (state.dirY === 'down' ? p.offY : -p.offY) - (p.h1 - p.h2) / 2;
        else if (state.baseY === 'bottom') coy = (state.dirY === 'down' ? p.offY : -p.offY) + (p.h1 - p.h2) / 2;
        else coy = (state.dirY === 'down' ? p.offY : -p.offY);

        return { cox, coy };
    }

    function drawSlash(ctx, x, y, angle) {
        const size = 5;
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(angle + Math.PI / 4);
        ctx.beginPath(); ctx.moveTo(-size, 0); ctx.lineTo(size, 0); ctx.stroke();
        ctx.restore();
    }

    function drawDimLine(ctx, x1, y1, x2, y2, color = "#475569") {
        ctx.strokeStyle = color;
        ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
        const angle = Math.atan2(y2 - y1, x2 - x1);
        drawSlash(ctx, x1, y1, angle);
        drawSlash(ctx, x2, y2, angle);
    }

    function drawLabel(ctx, text, x, y, color = "#1e293b", align = "center") {
        ctx.save();
        ctx.font = "bold 12px sans-serif";
        ctx.textAlign = align;
        const metrics = ctx.measureText(text);
        ctx.fillStyle = "rgba(255,255,255,0.85)";
        ctx.fillRect(x - metrics.width/2 - 2, y - 8, metrics.width + 4, 16);
        ctx.fillStyle = color;
        ctx.fillText(text, x, y + 4);
        ctx.restore();
    }

    function drawDim(ctx, x1, y1, x2, y2, text, offset = 30, isVer = false) {
        ctx.strokeStyle = "#94a3b8";
        ctx.lineWidth = 0.5;
        if (!isVer) {
            ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x1, y1 + offset);
            ctx.moveTo(x2, y2); ctx.lineTo(x2, y2 + offset); ctx.stroke();
            drawDimLine(ctx, x1, y1 + offset * 0.8, x2, y2 + offset * 0.8);
            drawLabel(ctx, text, (x1 + x2) / 2, y1 + offset * 0.8);
        } else {
            ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x1 + offset, y1);
            ctx.moveTo(x2, y2); ctx.lineTo(x2 + offset, y2); ctx.stroke();
            drawDimLine(ctx, x1 + offset * 0.8, y1, x1 + offset * 0.8, y2);
            drawLabel(ctx, text, x1 + offset + 20, (y1 + y2) / 2, "#1e293b", "left");
        }
    }

    function drawOffsetDim(ctx, x1, y1, x2, y2, text, offset = 50, isVer = false) {
        ctx.save();
        ctx.setLineDash([4, 4]);
        ctx.strokeStyle = "#cbd5e1";
        ctx.lineWidth = 1;
        ctx.beginPath();
        if(!isVer) {
            ctx.moveTo(x1, y1); ctx.lineTo(x1, y1 + offset);
            ctx.moveTo(x2, y2); ctx.lineTo(x1, y1 + offset);
            ctx.stroke();
            ctx.setLineDash([]);
            drawDimLine(ctx, x1, y1 + offset * 0.8, x2, y1 + offset * 0.8, "#ef4444");
            drawLabel(ctx, text, (x1 + x2) / 2, y1 + offset * 0.8, "#ef4444");
        } else {
            ctx.moveTo(x1, y1); ctx.lineTo(x1 + offset, y1);
            ctx.moveTo(x2, y2); ctx.lineTo(x1 + offset, y2);
            ctx.stroke();
            ctx.setLineDash([]);
            drawDimLine(ctx, x1 + offset * 0.8, y1, x1 + offset * 0.8, y2, "#ef4444");
            drawLabel(ctx, text, x1 + offset + 20, (y1 + y2) / 2, "#ef4444", "left");
        }
        ctx.restore();
    }

    function drawTop(ctx, w, h, sc, p, cox, coy) {
        const cx = w/2 + (cox*sc)/2, cy = h/2;
        const yA = cy + (p.L/2)*sc, yB = cy - (p.L/2)*sc;
        const xA1 = cx - cox*sc - (p.w1/2)*sc, xA2 = cx - cox*sc + (p.w1/2)*sc;
        const xB1 = cx - (p.w2/2)*sc, xB2 = cx + (p.w2/2)*sc;
        
        ctx.beginPath(); ctx.lineWidth = 1; ctx.strokeStyle = "#334155";
        ctx.moveTo(xA1, yA); ctx.lineTo(xA2, yA); ctx.lineTo(xB2, yB); ctx.lineTo(xB1, yB); ctx.closePath();
        ctx.stroke();
        
        ctx.lineWidth = 3; ctx.strokeStyle = "#2563eb"; ctx.beginPath(); ctx.moveTo(xA1, yA); ctx.lineTo(xA2, yA); ctx.stroke();
        ctx.strokeStyle = "#ea580c"; ctx.beginPath(); ctx.moveTo(xB1, yB); ctx.lineTo(xB2, yB); ctx.stroke();
        
        drawDim(ctx, xA1, yA, xA2, yA, `A面幅: ${p.w1}`, 40);
        drawDim(ctx, xB1, yB, xB2, yB, `B面幅: ${p.w2}`, -40);
        drawDim(ctx, xA2, yA, xA2, yB, `全長 L: ${p.L}`, 60, true);

        let bX = (state.baseX === 'left') ? xA1 : (state.baseX === 'right' ? xA2 : (xA1+xA2)/2);
        let tX = (state.baseX === 'left') ? xB1 : (state.baseX === 'right' ? xB2 : (xB1+xB2)/2);
        drawOffsetDim(ctx, bX, yA, tX, yB, `横振れ: ${p.offX}`, 100);
    }

    function drawFront(ctx, w, h, sc, p, cox, coy) {
        const cx = w/2 - (cox*sc)/2, cy = h/2 - (coy*sc)/2;
        const xA = cx - (p.w1/2)*sc, yA = cy - (p.h1/2)*sc;
        const xB = cx + (cox - p.w2/2)*sc, yB = cy + (coy - p.h2/2)*sc;
        
        ctx.lineWidth = 2; ctx.strokeStyle = "#2563eb"; 
        ctx.strokeRect(xA, yA, p.w1*sc, p.h1*sc);
        drawLabel(ctx, `A面: ${p.w1}×${p.h1}`, xA + (p.w1*sc)/2, yA + (p.h1*sc)/2, "#2563eb");
        
        ctx.setLineDash([5,3]); ctx.strokeStyle = "#ea580c";
        ctx.strokeRect(xB, yB, p.w2*sc, p.h2*sc);
        ctx.setLineDash([]);
        drawLabel(ctx, `B面: ${p.w2}×${p.h2}`, xB + (p.w2*sc)/2, yB + (p.h2*sc)/2, "#ea580c");
    }

    function drawSide(ctx, w, h, sc, p, coy) {
        const cx = w/2 - (p.L/2)*sc - 20, cy = h/2 - (coy*sc)/2;
        const xA = cx, xB = cx + p.L*sc;
        const yA1 = cy - (p.h1/2)*sc, yA2 = cy + (p.h1/2)*sc;
        const yB1 = cy + (coy - p.h2/2)*sc, yB2 = cy + (coy + p.h2/2)*sc;

        ctx.beginPath(); ctx.lineWidth = 1; ctx.strokeStyle = "#334155";
        ctx.moveTo(xA, yA1); ctx.lineTo(xA, yA2); ctx.lineTo(xB, yB2); ctx.lineTo(xB, yB1); ctx.closePath();
        ctx.stroke();

        ctx.lineWidth = 3; ctx.strokeStyle = "#2563eb"; ctx.beginPath(); ctx.moveTo(xA, yA1); ctx.lineTo(xA, yA2); ctx.stroke();
        ctx.strokeStyle = "#ea580c"; ctx.beginPath(); ctx.moveTo(xB, yB1); ctx.lineTo(xB, yB2); ctx.stroke();

        drawDim(ctx, xA, yA1, xA, yA2, `A面高: ${p.h1}`, -40, true);
        drawDim(ctx, xB, yB1, xB, yB2, `B面高: ${p.h2}`, 40, true);
        drawDim(ctx, xA, yA2, xB, yB2, `全長 L: ${p.L}`, 60);

        let bY = (state.baseY === 'top') ? yA1 : (state.baseY === 'bottom' ? yA2 : (yA1+yA2)/2);
        let tY = (state.baseY === 'top') ? yB1 : (state.baseY === 'bottom' ? yB2 : (yB1+yB2)/2);
        drawOffsetDim(ctx, xA, bY, xB, tY, `縦振れ: ${p.offY}`, -100, true);
    }

    function drawAll() {
        const p = getParams();
        const { cox, coy } = calculateOffsets(p);
        ['topView', 'frontView', 'sideView'].forEach(id => {
            const cv = document.getElementById(id);
            const ctx = cv.getContext('2d');
            const dpr = window.devicePixelRatio || 1;
            const rect = cv.parentElement.getBoundingClientRect();
            cv.width = rect.width * dpr; cv.height = rect.height * dpr;
            ctx.scale(dpr, dpr); ctx.clearRect(0,0, rect.width, rect.height);
            const sc = Math.min(rect.width, rect.height) / (Math.max(p.w1,p.w2,p.h1,p.h2,p.L,p.offX,p.offY)*2.8);
            if(id === 'topView') drawTop(ctx, rect.width, rect.height, sc, p, cox, coy);
            if(id === 'frontView') drawFront(ctx, rect.width, rect.height, sc, p, cox, coy);
            if(id === 'sideView') drawSide(ctx, rect.width, rect.height, sc, p, coy);
        });
    }

    function setParam(key, val) {
        state[key] = val;
        const parent = document.getElementById(key);
        const labels = {
            baseX:{left:'左基準',center:'芯基準',right:'右基準'},
            dirX:{left:'左へ',right:'右へ'},
            baseY:{top:'天基準',center:'芯基準',bottom:'底基準'},
            dirY:{up:'上げ',down:'下げ'}
        };
        parent.querySelectorAll('.tab-btn').forEach(b => {
            b.classList.toggle('active', b.textContent === labels[key][val]);
        });
        drawAll();
    }

    function closeModal() { document.getElementById('previewModal').classList.remove('active'); }

    function exportOrderImage() {
        const p = getParams();
        const { cox, coy } = calculateOffsets(p);
        const canvas = document.getElementById('exportCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 1200; canvas.height = 1600;
        ctx.fillStyle = "#ffffff"; ctx.fillRect(0,0,1200,1600);
        
        // ヘッダー
        ctx.fillStyle = "#0f172a"; ctx.fillRect(0, 0, 1200, 100);
        ctx.fillStyle = "#ffffff"; ctx.font = "bold 44px 'Noto Sans JP'";
        ctx.fillText("製作仕様書 (角ダクト振れ管)", 40, 65);
        ctx.font = "20px 'Noto Sans JP'";
        ctx.fillText(`発行日時: ${new Date().toLocaleString()}`, 850, 65);

        // パラメータセクション
        ctx.fillStyle = "#f8fafc"; ctx.fillRect(40, 140, 1120, 180);
        ctx.strokeStyle = "#e2e8f0"; ctx.strokeRect(40, 140, 1120, 180);
        ctx.fillStyle = "#334155"; ctx.font = "bold 24px 'Noto Sans JP'";
        ctx.fillText("■ 振れ管パラメータ", 70, 190);
        
        ctx.font = "bold 26px sans-serif";
        ctx.fillText(`A面: ${p.w1} × ${p.h1}`, 70, 240);
        ctx.fillText(`B面: ${p.w2} × ${p.h2}`, 400, 240);
        ctx.fillText(`全長 L: ${p.L}`, 750, 240);

        ctx.font = "22px sans-serif";
        const xLabels = {left:'左基準',center:'芯基準',right:'右基準'};
        const dxLabels = {left:'左へ',right:'右へ'};
        const yLabels = {top:'天基準',center:'芯基準',bottom:'底基準'};
        const dyLabels = {up:'上げ',down:'下げ'};
        ctx.fillText(`横振れ(X): ${xLabels[state.baseX]} / ${p.offX} / ${dxLabels[state.dirX]}`, 70, 285);
        ctx.fillText(`縦振れ(Y): ${yLabels[state.baseY]} / ${p.offY} / ${dyLabels[state.dirY]}`, 550, 285);

        // 図面ラベル
        ctx.fillStyle = "#64748b"; ctx.font = "bold 20px sans-serif";
        ctx.fillText("平面図 (Top View)", 40, 360);
        ctx.fillText("正面図 (Front View)", 620, 360);
        ctx.fillText("側面図 (Side View)", 40, 880);

        const sc = 0.8; // 拡大率
        // 各図面の描画
        const drawSect = (x, y, w, h, fn, arg) => {
            ctx.save(); ctx.translate(x, y);
            ctx.strokeStyle = "#f1f5f9"; ctx.strokeRect(0,0,w,h);
            const s = Math.min(w,h) / (Math.max(p.w1,p.w2,p.h1,p.h2,p.L,p.offX,p.offY)*3);
            fn(ctx, w, h, s, p, arg.cx, arg.cy); ctx.restore();
        };

        drawSect(40, 380, 560, 480, drawTop, {cx:cox, cy:coy});
        drawSect(620, 380, 560, 480, drawFront, {cx:cox, cy:coy});
        drawSect(40, 900, 1120, 650, (c,w,h,s,p,cx,cy)=>drawSide(c,w,h,s,p,cy), {cx:0, cy:coy});

        document.getElementById('previewImage').src = canvas.toDataURL();
        document.getElementById('previewModal').classList.add('active');
    }

    document.querySelectorAll('input').forEach(i => i.addEventListener('input', drawAll));
    window.onload = () => { setTimeout(drawAll, 50); };
    window.onresize = drawAll;
</script>

</body>
</html>
